<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAMM 条例ロビイング ダッシュボード</title>
<style>
  :root {
    --bg: #0F1117; --surface: #1A1D27; --surface2: #232732;
    --border: #2E3240; --text: #E0E4EC; --text2: #8B92A5;
    --blue: #4A9EF5; --green: #4ADE80; --amber: #FBBF24; --grey: #6B7280;
    --green-bg: #0D2818; --green-border: #1A5C30;
    --amber-bg: #2D2305; --amber-border: #6B5A10;
    --grey-bg: #1E2028; --grey-border: #3A3D48;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,Arial,sans-serif; color:var(--text); }
  .wrapper { max-width:1280px; margin:0 auto; padding:20px 24px; }

  /* Header */
  .header { display:flex; align-items:center; justify-content:space-between; padding:20px 0 20px; border-bottom:1px solid var(--border); margin-bottom:24px; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-left img { height:32px; opacity:0.9; }
  .header-left h1 { font-size:18px; font-weight:700; letter-spacing:0.5px; }
  .header-right { text-align:right; }
  .header-date { font-size:12px; color:var(--text2); }

  /* Filter tabs */
  .filter-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--text2); padding:6px 14px; border-radius:6px; font-size:12px; cursor:pointer; transition:all 0.15s; }
  .filter-btn:hover { border-color:var(--blue); color:var(--blue); }
  .filter-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

  /* Summary */
  .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
  .stat .n { font-size:28px; font-weight:800; }
  .stat .n.blue { color:var(--blue); }
  .stat .n.green { color:var(--green); }
  .stat .n.amber { color:var(--amber); }
  .stat .n.grey { color:var(--grey); }
  .stat .l { font-size:11px; color:var(--text2); margin-top:2px; }

  /* Phase map */
  .phase-map { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; }
  .chip { padding:5px 12px; border-radius:6px; font-size:11px; font-weight:600; cursor:pointer; transition:all 0.15s; }
  .chip:hover { transform:translateY(-1px); }
  .chip.p4 { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
  .chip.p3 { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-border); }
  .chip.p2 { background:var(--grey-bg); color:var(--grey); border:1px solid var(--grey-border); }

  /* Cards */
  .cards { display:grid; gap:14px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color 0.15s; }
  .card:hover { border-color:var(--blue); }
  .card.p4 { border-left:3px solid var(--green); }
  .card.p3 { border-left:3px solid var(--amber); }
  .card.p2 { border-left:3px solid var(--grey); }
  .card-top { display:flex; align-items:flex-start; justify-content:space-between; padding:14px 18px 6px; }
  .card-area { font-size:15px; font-weight:700; }
  .badge { font-size:10px; font-weight:600; padding:3px 10px; border-radius:12px; white-space:nowrap; }
  .badge.p4 { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
  .badge.p3 { background:var(--amber-bg); color:var(--amber); border:1px solid var(--amber-border); }
  .badge.p2 { background:var(--grey-bg); color:var(--grey); border:1px solid var(--grey-border); }
  .card-eff { padding:0 18px 8px; font-size:11px; color:var(--text2); }
  .card-body { padding:0 18px 12px; display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .card-body.full { grid-template-columns:1fr; }
  .sec-title { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:3px; }
  .sec-content { font-size:12px; line-height:1.7; color:var(--text2); white-space:pre-line; }
  .sec-content.accent { color:#5EEAD4; }
  .card-detail { border-top:1px solid var(--border); }
  .card-detail summary { padding:8px 18px; font-size:11px; color:var(--text2); cursor:pointer; user-select:none; }
  .card-detail summary:hover { color:var(--blue); }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:0 18px 14px; }
  .detail-grid .sec-content { font-size:11px; line-height:1.8; }

  /* Footer */
  .footer { text-align:center; padding:32px 0 16px; font-size:11px; color:var(--text2); border-top:1px solid var(--border); margin-top:24px; }

  @media(max-width:768px) {
    .summary { grid-template-columns:repeat(2,1fr); }
    .card-body,.detail-grid { grid-template-columns:1fr; }
    .header { flex-direction:column; gap:8px; align-items:flex-start; }
  }
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;background:#0F1117;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;">
    <div style="font-size:14px;color:#8B92A5;margin-bottom:12px;">JAMM Internal Dashboard</div>
    <input id="pw" type="password" placeholder="パスワード" 
      style="background:#1A1D27;border:1px solid #2E3240;color:#E0E4EC;padding:10px 16px;border-radius:8px;font-size:14px;width:200px;text-align:center;"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div style="margin-top:8px;">
      <button onclick="checkPw()" style="background:#4A9EF5;color:#fff;border:none;padding:8px 24px;border-radius:6px;cursor:pointer;font-size:13px;">Enter</button>
    </div>
    <div id="pwErr" style="color:#EF4444;font-size:12px;margin-top:8px;display:none;">incorrect</div>
  </div>
</div>
<script>
function checkPw(){
  // simple hash check (not crypto-secure, but prevents casual access)
  var v=document.getElementById('pw').value;
  if(btoa(v)==='amFtbTIwMjY='){
    document.getElementById('gate').style.display='none';
    sessionStorage.setItem('authed','1');
  } else {
    document.getElementById('pwErr').style.display='block';
  }
}
if(sessionStorage.getItem('authed')==='1') document.addEventListener('DOMContentLoaded',function(){document.getElementById('gate').style.display='none';});
</script>

function nl2br(s) { return (s||'').replace(/\n/g,'<br>'); }
function phaseClass(p) { return p.startsWith('4')?'p4':p.startsWith('3')?'p3':'p2'; }
function phaseLabel(p) { return p.startsWith('4')?'可決・施行準備':p.startsWith('3')?'検討・具体化中':'動向注視'; }
function shortName(a) { return a.replace('東京都','').replace('（国）',''); }

function renderMap() {
  const el = document.getElementById('phaseMap');
  el.innerHTML = DATA.map(d => 
    `<div class="chip ${phaseClass(d.phase)}" onclick="scrollToCard('${d.area}')">${shortName(d.area)}</div>`
  ).join('');
}

function renderCards(filter) {
  const el = document.getElementById('cardsContainer');
  const filtered = filter==='all' ? DATA : DATA.filter(d=>d.phase.startsWith(filter));
  el.innerHTML = filtered.map(d => {
    const pc = phaseClass(d.phase);
    const hasRyokan = d.ryokan.trim().length > 0;
    return `
    <div class="card ${pc}" id="card-${d.area}">
      <div class="card-top">
        <div class="card-area">${d.area}</div>
        <div class="badge ${pc}">${phaseLabel(d.phase)}</div>
      </div>
      <div class="card-eff">${nl2br(d.effective)||'—'}</div>
      <div class="card-body${hasRyokan?'':' full'}">
        <div>
          <div class="sec-title">規制内容${hasRyokan?' (住宅宿泊事業)':''}</div>
          <div class="sec-content">${nl2br(d.minpaku)||'<span style="color:var(--grey)">—</span>'}</div>
        </div>
        ${hasRyokan?`<div>
          <div class="sec-title">規制内容 (旅館業)</div>
          <div class="sec-content">${nl2br(d.ryokan)}</div>
        </div>`:''}
      </div>
      ${d.lobby?`<div style="padding:0 18px 12px">
        <div class="sec-title">渉外ポイント / Next Action</div>
        <div class="sec-content accent">${nl2br(d.lobby)}</div>
      </div>`:''}
      <div class="card-detail">
        <details>
          <summary>タイムライン・体制詳細を表示</summary>
          <div class="detail-grid">
            <div><div class="sec-title">行政動向</div><div class="sec-content">${nl2br(d.admin_tl)||'—'}</div></div>
            <div><div class="sec-title">JAMM活動</div><div class="sec-content">${nl2br(d.jamm_tl)||'—'}</div></div>
            ${d.transition?`<div><div class="sec-title">経過措置</div><div class="sec-content">${nl2br(d.transition)}</div></div>`:''}
            ${d.admin_struct?`<div><div class="sec-title">意思決定体制</div><div class="sec-content">${nl2br(d.admin_struct)}</div></div>`:''}
            ${d.council?`<div><div class="sec-title">議会・キーパーソン</div><div class="sec-content">${nl2br(d.council)}</div></div>`:''}
          </div>
        </details>
      </div>
    </div>`;
  }).join('');
}

function filterCards(f) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards(f);
}

function scrollToCard(area) {
  const el = document.getElementById('card-'+area);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

renderMap();
renderCards('all');
</script>
